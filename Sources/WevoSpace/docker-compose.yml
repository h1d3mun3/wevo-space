version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wevospace-postgres
    environment:
      POSTGRES_USER: vapor
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wevospace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vapor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wevospace

  # 開発環境用: pgAdminを追加（オプション）
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wevospace-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wevospace.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - wevospace

volumes:
  postgres_data:

networks:
  wevospace:
    driver: bridge
