name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  UnitTest:
    runs-on: ubuntu-latest
    container:
      image: swift:6.0

    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-6.0-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.0-

      - name: Install SQLite
        run: apt-get update -q && apt-get install -y -q libsqlite3-dev

      - name: Build
        run: swift build --configuration debug

      - name: Test
        run: swift test
