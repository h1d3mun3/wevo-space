openapi: 3.0.0
info:
  title: WevoSpace Propose API
  description: |
    多者間の合意を暗号署名で記録・管理するAPI。
    認証機構は設けず、すべての状態遷移はP-256 ECDSA署名検証によって担保されます。
  version: 1.0.0
  contact:
    name: WevoSpace Team

servers:
  - url: http://localhost:8080/v1
    description: 開発環境
  - url: https://api.wevospace.example.com/v1
    description: 本番環境

tags:
  - name: Propose
    description: Proposeの作成・取得・状態遷移
  - name: Utility
    description: ヘルスチェック・サーバー情報
  - name: NodeSync
    description: ノード間同期エンドポイント（エンドユーザークライアント向けではありません）

paths:
  /proposes:
    post:
      summary: Propose作成
      description: |
        作成者が新しいProposeを作成します。
        署名対象: `"proposed." + proposeId + contentHash + creatorPublicKey + counterpartyPublicKeys（辞書順ソート&結合） + createdAt`
      tags: [Propose]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProposeInput'
            example:
              proposeId: "550E8400-E29B-41D4-A716-446655440000"
              contentHash: "abc123def456"
              creatorPublicKey: "BHqG..."
              creatorSignature: "MEUC..."
              counterpartyPublicKeys: ["BIrH...", "BJsI..."]
              createdAt: "2026-01-01T00:00:00Z"
      responses:
        '201':
          description: 作成成功
        '400':
          description: proposeIdの形式が無効、またはcounterpartyPublicKeysが空
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 署名検証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 同じIDのProposeが既に存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}:
    get:
      summary: Propose詳細取得
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposeResponse'
        '400':
          description: 無効なUUID形式
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proposeが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Proposeを解消（proposed → dissolved）
      description: |
        作成者またはいずれかの相手方が署名してProposeを解消します。proposed状態のみ可。
        署名対象: `"dissolved." + proposeId + contentHash + publicKey + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionInput'
            example:
              publicKey: "BHqG..."
              signature: "MEUC..."
              timestamp: "2026-01-02T00:00:00Z"
      responses:
        '200':
          description: 解消成功、dissolvedに遷移
        '401':
          description: 署名検証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 参加者以外の公開鍵
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proposeが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: proposed状態ではない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}/sign:
    patch:
      summary: 相手方が署名（全員揃うとproposed → signed）
      description: |
        登録済みの相手方が署名します。全ての相手方が署名した時点でsigned状態に自動遷移します。
        署名対象: `"signed." + proposeId + contentHash + signerPublicKey + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInput'
            example:
              signerPublicKey: "BIrH..."
              signature: "MEUC..."
              timestamp: "2026-01-01T00:00:00Z"
      responses:
        '200':
          description: 署名成功。全相手方が揃えばsignedに遷移
        '400':
          description: 無効なPropose ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 署名検証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: signerPublicKeyが登録済み相手方ではない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proposeが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: proposed状態ではない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}/honor:
    patch:
      summary: Honor署名を追加（全員揃うとsigned → honored）
      description: |
        各参加者が署名を追加します。作成者と全ての相手方が揃うとhonored状態に自動遷移。
        署名対象: `"honored." + proposeId + contentHash + publicKey + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionInput'
            example:
              publicKey: "BHqG..."
              signature: "MEUC..."
              timestamp: "2026-01-03T00:00:00Z"
      responses:
        '200':
          description: 署名記録。全員揃えばhonored遷移
        '401':
          description: 署名検証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 参加者以外の公開鍵
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proposeが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: signed状態ではない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}/part:
    patch:
      summary: Part署名を追加（いずれか1人でsigned → 即座にparted）
      description: |
        いずれかの参加者が署名を追加します。1人でも送信した時点で即座にparted状態へ遷移します。全員分を待ちません。
        署名対象: `"parted." + proposeId + contentHash + publicKey + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionInput'
            example:
              publicKey: "BHqG..."
              signature: "MEUC..."
              timestamp: "2026-01-03T00:00:00Z"
      responses:
        '200':
          description: 署名記録。即座にparted遷移
        '401':
          description: 署名検証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 参加者以外の公開鍵
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proposeが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: signed状態ではない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health:
    get:
      summary: ヘルスチェック
      description: サーバーの稼働状態を返します。`/v1` プレフィックスは不要です。
      tags: [Utility]
      responses:
        '200':
          description: サーバー正常稼働中
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    example: "1711234567.0"

  /info:
    get:
      summary: サーバー情報
      description: プロトコル名、サーバーバージョン、ピアノードURLを返します。`/v1` プレフィックスは不要です。
      tags: [Utility]
      responses:
        '200':
          description: サーバー情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'

  /v1/sync/proposes:
    get:
      summary: 指定日時以降に更新されたProposeを取得
      description: |
        `updatedAt` が指定タイムスタンプより後のProposeを `updatedAt` 昇順で返します。
        ピアノードが差分を取得するために使用します。大量データの初回同期にはページネーションをサポートしています。
        レスポンス件数が `limit` 未満の場合、最終ページに達したことを示します。
        サーバーに `SYNC_SECRET` が設定されている場合は `Authorization: Bearer <SYNC_SECRET>` が必要です。
      tags: [NodeSync]
      security:
        - syncBearer: []
      parameters:
        - name: after
          in: query
          required: false
          description: ISO8601タイムスタンプ。この日時より後に更新されたProposeを返す。省略時は全件返す（初回同期用）
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          description: 1ページあたりの件数（デフォルト: 500、最大: 1000）
          schema:
            type: integer
            default: 500
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: スキップするレコード数（デフォルト: 0）
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: updatedAt昇順でソートされたProposeResponseの配列（空配列も可）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProposeResponse'
        '400':
          description: '`after` パラメータの形式が不正'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authorizationヘッダーが不正または欠落
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/sync/proposes/batch:
    post:
      summary: Proposeバッチをプッシュしてマージ
      description: |
        Proposeの配列を受け取り、ローカルDBにマージします。
        各ProposeはUpsert処理されます。既存フィールドをnullで上書きすることはなく、署名フィールドはnullの場合にのみ書き込みます（append-onlyマージ）。
        サーバーに `SYNC_SECRET` が設定されている場合は `Authorization: Bearer <SYNC_SECRET>` が必要です。
      tags: [NodeSync]
      security:
        - syncBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncBatchInput'
      responses:
        '200':
          description: バッチを受理してマージ完了
        '400':
          description: リクエストボディが不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authorizationヘッダーが不正または欠落
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    syncBearer:
      type: http
      scheme: bearer
      description: ノード間認証用の共有シークレット（SYNC_SECRET環境変数）

  parameters:
    ProposeId:
      name: id
      in: path
      required: true
      description: Propose ID（UUID）
      schema:
        type: string
        format: uuid

  schemas:
    ProposeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Propose ID（クライアントが生成）
        contentHash:
          type: string
          description: コンテンツのハッシュ値
        creatorPublicKey:
          type: string
          description: 作成者の公開鍵（JWK JSON文字列）
        creatorSignature:
          type: string
          description: 作成者の署名（Base64 / DER形式）
        counterparties:
          type: array
          items:
            $ref: '#/components/schemas/CounterpartyInfo'
          description: 相手方と各署名のリスト
        honorCreatorSignature:
          type: string
          nullable: true
          description: 作成者のhonor署名
        honorCreatorTimestamp:
          type: string
          nullable: true
          description: 作成者のhonorタイムスタンプ（ISO8601）
        partCreatorSignature:
          type: string
          nullable: true
          description: 作成者のpart署名
        partCreatorTimestamp:
          type: string
          nullable: true
          description: 作成者のpartタイムスタンプ（ISO8601）
        dissolvedAt:
          type: string
          nullable: true
          description: 解消タイムスタンプ（ISO8601）
        status:
          type: string
          enum: [proposed, signed, honored, dissolved, parted]
          description: 現在の状態
        signatureVersion:
          type: integer
          description: 署名スキームバージョン（現行: 1）
        createdAt:
          type: string
          description: 作成日時（ISO8601、クライアントが生成）
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: 最終更新日時（サーバーが管理）

    CounterpartyInfo:
      type: object
      properties:
        publicKey:
          type: string
          description: 相手方の公開鍵（JWK JSON文字列）
        signSignature:
          type: string
          nullable: true
          description: /sign の署名（署名後にセット）
        signTimestamp:
          type: string
          nullable: true
          description: /sign のタイムスタンプ（ISO8601）
        honorSignature:
          type: string
          nullable: true
          description: /honor の署名
        honorTimestamp:
          type: string
          nullable: true
          description: /honor のタイムスタンプ（ISO8601）
        partSignature:
          type: string
          nullable: true
          description: /part の署名
        partTimestamp:
          type: string
          nullable: true
          description: /part のタイムスタンプ（ISO8601）

    CreateProposeInput:
      type: object
      required:
        - proposeId
        - contentHash
        - creatorPublicKey
        - creatorSignature
        - counterpartyPublicKeys
        - createdAt
      properties:
        proposeId:
          type: string
          description: UUID文字列（クライアントが生成）
        contentHash:
          type: string
          description: コンテンツのハッシュ値
        creatorPublicKey:
          type: string
          description: 作成者の公開鍵（JWK JSON文字列）
        creatorSignature:
          type: string
          description: 作成者の署名（Base64 / DER形式）
        counterpartyPublicKeys:
          type: array
          items:
            type: string
          minItems: 1
          description: 相手方の公開鍵リスト（1件以上）
        createdAt:
          type: string
          description: ISO8601形式の作成日時

    SignInput:
      type: object
      required:
        - signerPublicKey
        - signature
        - timestamp
      properties:
        signerPublicKey:
          type: string
          description: 署名者の公開鍵（登録済みの相手方であること、JWK JSON文字列）
        signature:
          type: string
          description: 署名者の署名（Base64 / DER形式）
        timestamp:
          type: string
          description: 操作タイムスタンプ（ISO8601）

    TransitionInput:
      type: object
      required:
        - publicKey
        - signature
        - timestamp
      properties:
        publicKey:
          type: string
          description: 操作者の公開鍵（creator or counterparty）
        signature:
          type: string
          description: 操作者の署名（Base64 / DER形式）
        timestamp:
          type: string
          description: 操作日時（ISO8601）

    InfoResponse:
      type: object
      properties:
        protocol:
          type: string
          example: wevo
        version:
          type: string
          example: 0.2.0
        peers:
          type: array
          items:
            type: string
          description: クラスター内の既知ピアノードURL（シングルノード構成では空配列）
          example: ["https://node-b.example.com", "https://node-c.example.com"]

    SyncBatchInput:
      type: array
      description: マージするProposeResponseオブジェクトの配列
      items:
        $ref: '#/components/schemas/ProposeResponse'

    ErrorResponse:
      type: object
      properties:
        error:
          type: boolean
          example: true
        reason:
          type: string
          description: エラーの理由
