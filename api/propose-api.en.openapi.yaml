openapi: 3.0.0
info:
  title: WevoSpace Propose API
  description: |
    API for recording and managing multi-party agreements with cryptographic signatures.
    No authentication tokens required — all state transitions are secured by P-256 ECDSA signature verification.
  version: 1.0.0
  contact:
    name: WevoSpace Team

servers:
  - url: http://localhost:8080/v1
    description: Development server
  - url: https://api.wevospace.example.com/v1
    description: Production server

tags:
  - name: Propose
    description: Create, retrieve, and transition Proposes
  - name: Utility
    description: Health check and server info

paths:
  /proposes:
    get:
      summary: List proposes
      description: |
        Returns proposes where the specified public key is either the creator or one of the counterparties.
        Multiple status values can be specified as comma-separated values.
      tags: [Propose]
      parameters:
        - name: publicKey
          in: query
          required: true
          description: Public key to search by (JWK JSON string, percent-encoded)
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter by status (comma-separated for multiple values, e.g. proposed,signed)
          schema:
            type: string
            example: proposed,signed
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: per
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposePage'
        '400':
          description: publicKey is missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create a propose
      description: |
        The creator creates a new Propose.
        Message to sign: `"proposed." + proposeId + contentHash + creatorPublicKey + counterpartyPublicKeys(sorted & joined) + createdAt`
      tags: [Propose]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProposeInput'
            example:
              proposeId: "550E8400-E29B-41D4-A716-446655440000"
              contentHash: "abc123def456"
              creatorPublicKey: "BHqG..."
              creatorSignature: "MEUC..."
              counterpartyPublicKeys: ["BIrH...", "BJsI..."]
              createdAt: "2026-01-01T00:00:00Z"
      responses:
        '201':
          description: Propose created successfully
        '400':
          description: Invalid proposeId format, or counterpartyPublicKeys is empty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A Propose with the same ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}:
    get:
      summary: Get propose details
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposeResponse'
        '400':
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Propose not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Dissolve a propose (proposed → dissolved)
      description: |
        The creator or any counterparty signs to dissolve the Propose. Only allowed from `proposed` state.
        Message to sign: `"dissolved." + proposeId + contentHash + publicKey + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionInput'
            example:
              publicKey: "BHqG..."
              signature: "MEUC..."
              timestamp: "2026-01-02T00:00:00Z"
      responses:
        '200':
          description: Dissolved successfully; transitions to dissolved
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Public key does not belong to a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Propose not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Propose is not in proposed state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}/sign:
    patch:
      summary: Counterparty signs (auto-transitions to signed when all have signed)
      description: |
        A registered counterparty signs the Propose. The Propose automatically transitions to `signed`
        once all counterparties have signed.
        Message to sign: `"signed." + proposeId + contentHash + signerPublicKey + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInput'
            example:
              signerPublicKey: "BIrH..."
              signature: "MEUC..."
              timestamp: "2026-01-01T00:00:00Z"
      responses:
        '200':
          description: Signed successfully; transitions to signed when all counterparties have signed
        '400':
          description: Invalid Propose ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: signerPublicKey is not a registered counterparty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Propose not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Propose is not in proposed state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}/honor:
    patch:
      summary: Submit honor signature (auto-transitions to honored when all submitted)
      description: |
        Each participant submits a signature. Once the creator and all counterparties have signed,
        the Propose automatically transitions to `honored`.
        Message to sign: `"honored." + proposeId + contentHash + publicKey + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionInput'
            example:
              publicKey: "BHqG..."
              signature: "MEUC..."
              timestamp: "2026-01-03T00:00:00Z"
      responses:
        '200':
          description: Signature recorded; transitions to honored when all participants have submitted
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Public key does not belong to a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Propose not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Propose is not in signed state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}/part:
    patch:
      summary: Submit part signature (transitions to parted immediately when any participant submits)
      description: |
        Any participant submits a signature. The Propose transitions to `parted` immediately
        when any one participant submits — no need to wait for all participants.
        Message to sign: `"parted." + proposeId + contentHash + publicKey + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionInput'
            example:
              publicKey: "BHqG..."
              signature: "MEUC..."
              timestamp: "2026-01-03T00:00:00Z"
      responses:
        '200':
          description: Signature recorded; transitions to parted immediately
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Public key does not belong to a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Propose not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Propose is not in signed state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

/health:
    get:
      summary: Health check
      description: Returns the server's operational status. No `/v1` prefix.
      tags: [Utility]
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    example: "1711234567.0"

  /info:
    get:
      summary: Server info
      description: Returns the protocol name, version, and supported capabilities. No `/v1` prefix.
      tags: [Utility]
      responses:
        '200':
          description: Server information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'

components:
  parameters:
    ProposeId:
      name: id
      in: path
      required: true
      description: Propose ID (UUID)
      schema:
        type: string
        format: uuid

  schemas:
    ProposeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Propose ID (client-generated)
        contentHash:
          type: string
          description: Hash of the content
        creatorPublicKey:
          type: string
          description: Creator's public key (JWK JSON string)
        creatorSignature:
          type: string
          description: Creator's signature (Base64 / DER format)
        counterparties:
          type: array
          items:
            $ref: '#/components/schemas/CounterpartyInfo'
          description: List of counterparties and their signatures
        honorCreatorSignature:
          type: string
          nullable: true
          description: Creator's honor signature
        honorCreatorTimestamp:
          type: string
          nullable: true
          description: Creator's honor timestamp (ISO8601)
        partCreatorSignature:
          type: string
          nullable: true
          description: Creator's part signature
        partCreatorTimestamp:
          type: string
          nullable: true
          description: Creator's part timestamp (ISO8601)
        dissolvedAt:
          type: string
          nullable: true
          description: Dissolution timestamp (ISO8601)
        status:
          type: string
          enum: [proposed, signed, honored, dissolved, parted]
          description: Current status
        signatureVersion:
          type: integer
          description: Signature scheme version (current: 1)
        createdAt:
          type: string
          description: Creation timestamp (ISO8601, client-generated)
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: Last updated timestamp (server-managed)

    CounterpartyInfo:
      type: object
      properties:
        publicKey:
          type: string
          description: Counterparty's public key (JWK JSON string)
        signSignature:
          type: string
          nullable: true
          description: Signature for /sign (set after signing)
        signTimestamp:
          type: string
          nullable: true
          description: Timestamp for /sign (ISO8601)
        honorSignature:
          type: string
          nullable: true
          description: Signature for /honor
        honorTimestamp:
          type: string
          nullable: true
          description: Timestamp for /honor (ISO8601)
        partSignature:
          type: string
          nullable: true
          description: Signature for /part
        partTimestamp:
          type: string
          nullable: true
          description: Timestamp for /part (ISO8601)

    ProposePage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProposeResponse'
        metadata:
          type: object
          properties:
            page:
              type: integer
            per:
              type: integer
            total:
              type: integer

    CreateProposeInput:
      type: object
      required:
        - proposeId
        - contentHash
        - creatorPublicKey
        - creatorSignature
        - counterpartyPublicKeys
        - createdAt
      properties:
        proposeId:
          type: string
          description: UUID string (client-generated)
        contentHash:
          type: string
          description: Hash of the content
        creatorPublicKey:
          type: string
          description: Creator's public key (JWK JSON string)
        creatorSignature:
          type: string
          description: Creator's signature (Base64 / DER format)
        counterpartyPublicKeys:
          type: array
          items:
            type: string
          minItems: 1
          description: Counterparty public keys (1 or more)
        createdAt:
          type: string
          description: ISO8601 creation timestamp

    SignInput:
      type: object
      required:
        - signerPublicKey
        - signature
        - timestamp
      properties:
        signerPublicKey:
          type: string
          description: Signer's public key (must be a registered counterparty, JWK JSON string)
        signature:
          type: string
          description: Signer's signature (Base64 / DER format)
        timestamp:
          type: string
          description: Operation timestamp (ISO8601)

    TransitionInput:
      type: object
      required:
        - publicKey
        - signature
        - timestamp
      properties:
        publicKey:
          type: string
          description: Requester's public key (creator or counterparty)
        signature:
          type: string
          description: Requester's signature (Base64 / DER format)
        timestamp:
          type: string
          description: Operation timestamp (ISO8601)

    InfoResponse:
      type: object
      properties:
        protocol:
          type: string
          example: wevo
        version:
          type: string
          example: 0.1.0
        capabilities:
          type: array
          items:
            type: string
          example: [proposes.create, proposes.read, proposes.sign]

    ErrorResponse:
      type: object
      properties:
        error:
          type: boolean
          example: true
        reason:
          type: string
          description: Error description
