openapi: 3.0.0
info:
  title: WevoSpace Propose API
  description: |
    API for recording and managing two-party agreements with cryptographic signatures.
    No authentication tokens required — all state transitions are secured by P-256 ECDSA signature verification.
  version: 1.0.0
  contact:
    name: WevoSpace Team

servers:
  - url: http://localhost:8080/v1
    description: Development server
  - url: https://api.wevospace.example.com/v1
    description: Production server

tags:
  - name: Propose
    description: Create, retrieve, and transition Proposes

paths:
  /proposes:
    get:
      summary: List proposes
      description: |
        Returns proposes where the specified public key is either the creator or the counterparty.
        Multiple status values can be specified as comma-separated values.
      tags: [Propose]
      parameters:
        - name: publicKey
          in: query
          required: true
          description: Public key to search by (Base64 / X.963 format)
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter by status (comma-separated for multiple values, e.g. proposed,signed)
          schema:
            type: string
            example: proposed,signed
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: per
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposePage'
        '400':
          description: publicKey is missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create a propose
      description: |
        The creator creates a new Propose.
        Message to sign: `proposeId + contentHash + counterpartyPublicKey + createdAt`
      tags: [Propose]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProposeInput'
            example:
              proposeId: "550E8400-E29B-41D4-A716-446655440000"
              contentHash: "abc123def456"
              creatorPublicKey: "BHqG..."
              creatorSignature: "MEUC..."
              counterpartyPublicKey: "BIrH..."
              createdAt: "2026-01-01T00:00:00Z"
      responses:
        '201':
          description: Propose created successfully
        '400':
          description: Invalid proposeId format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A Propose with the same ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}:
    get:
      summary: Get propose details
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Propose'
        '400':
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Propose not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Dissolve a propose (proposed → dissolved)
      description: |
        Either the creator or counterparty signs to dissolve the Propose. Only allowed from `proposed` state.
        Message to sign: `"dissolved." + proposeId + contentHash + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionInput'
            example:
              publicKey: "BHqG..."
              signature: "MEUC..."
              timestamp: "2026-01-02T00:00:00Z"
      responses:
        '200':
          description: Dissolved successfully; transitions to dissolved
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Public key does not belong to a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Propose not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Propose is not in proposed state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}/sign:
    patch:
      summary: Counterparty signs (proposed → signed)
      description: |
        The counterparty signs to transition the Propose to `signed` state.
        Message to sign: `proposeId + contentHash + counterpartyPublicKey + createdAt`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInput'
            example:
              counterpartySignature: "MEUC..."
              createdAt: "2026-01-01T00:00:00Z"
      responses:
        '200':
          description: Signed successfully; transitions to signed
        '400':
          description: createdAt mismatch or invalid UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Propose not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Propose is not in proposed state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}/honor:
    patch:
      summary: Submit honor signature (signed → honored)
      description: |
        Each party submits a signature. Once both have signed, the Propose automatically transitions to `honored`.
        Message to sign: `"honored." + proposeId + contentHash + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionInput'
            example:
              publicKey: "BHqG..."
              signature: "MEUC..."
              timestamp: "2026-01-03T00:00:00Z"
      responses:
        '200':
          description: Signature recorded; transitions to honored when both are submitted
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Public key does not belong to a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Propose not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Propose is not in signed state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}/part:
    patch:
      summary: Submit part signature (signed → parted)
      description: |
        Each party submits a signature. Once both have signed, the Propose automatically transitions to `parted`.
        Message to sign: `"parted." + proposeId + contentHash + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionInput'
            example:
              publicKey: "BHqG..."
              signature: "MEUC..."
              timestamp: "2026-01-03T00:00:00Z"
      responses:
        '200':
          description: Signature recorded; transitions to parted when both are submitted
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Public key does not belong to a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Propose not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Propose is not in signed state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    ProposeId:
      name: id
      in: path
      required: true
      description: Propose ID (UUID)
      schema:
        type: string
        format: uuid

  schemas:
    Propose:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Propose ID (client-generated)
        contentHash:
          type: string
          description: Hash of the content
        creatorPublicKey:
          type: string
          description: Creator's public key (Base64 / X.963 format)
        creatorSignature:
          type: string
          description: Creator's signature (Base64 / DER format)
        counterpartyPublicKey:
          type: string
          description: Counterparty's public key (Base64 / X.963 format)
        counterpartySignature:
          type: string
          nullable: true
          description: Counterparty's signature (set after signing)
        honorCreatorSignature:
          type: string
          nullable: true
          description: Creator's honor signature
        honorCounterpartySignature:
          type: string
          nullable: true
          description: Counterparty's honor signature
        partCreatorSignature:
          type: string
          nullable: true
          description: Creator's part signature
        partCounterpartySignature:
          type: string
          nullable: true
          description: Counterparty's part signature
        status:
          type: string
          enum: [proposed, signed, honored, dissolved, parted]
          description: Current status
        createdAt:
          type: string
          description: Creation timestamp (ISO8601, client-generated)
        updatedAt:
          type: string
          format: date-time
          description: Last updated timestamp (server-managed)

    ProposePage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Propose'
        metadata:
          type: object
          properties:
            page:
              type: integer
            per:
              type: integer
            total:
              type: integer

    CreateProposeInput:
      type: object
      required:
        - proposeId
        - contentHash
        - creatorPublicKey
        - creatorSignature
        - counterpartyPublicKey
        - createdAt
      properties:
        proposeId:
          type: string
          description: UUID string (client-generated)
        contentHash:
          type: string
          description: Hash of the content
        creatorPublicKey:
          type: string
          description: Creator's public key (Base64 / X.963 format)
        creatorSignature:
          type: string
          description: Creator's signature (Base64 / DER format)
        counterpartyPublicKey:
          type: string
          description: Counterparty's public key (Base64 / X.963 format)
        createdAt:
          type: string
          description: ISO8601 creation timestamp

    SignInput:
      type: object
      required:
        - counterpartySignature
        - createdAt
      properties:
        counterpartySignature:
          type: string
          description: Counterparty's signature (Base64 / DER format)
        createdAt:
          type: string
          description: Must match the Propose's createdAt

    TransitionInput:
      type: object
      required:
        - publicKey
        - signature
        - timestamp
      properties:
        publicKey:
          type: string
          description: Requester's public key (creator or counterparty)
        signature:
          type: string
          description: Requester's signature (Base64 / DER format)
        timestamp:
          type: string
          description: Operation timestamp (ISO8601)

    ErrorResponse:
      type: object
      properties:
        error:
          type: boolean
          example: true
        reason:
          type: string
          description: Error description
