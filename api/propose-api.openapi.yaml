openapi: 3.0.0
info:
  title: WevoSpace Propose API
  description: |
    多者間の合意を暗号署名で記録・管理するAPI。
    認証機構は設けず、すべての状態遷移はP-256 ECDSA署名検証によって担保されます。
  version: 1.0.0
  contact:
    name: WevoSpace Team

servers:
  - url: http://localhost:8080/v1
    description: 開発環境
  - url: https://api.wevospace.example.com/v1
    description: 本番環境

tags:
  - name: Propose
    description: Proposeの作成・取得・状態遷移

paths:
  /proposes:
    get:
      summary: Propose一覧取得
      description: |
        指定した公開鍵が creator またはいずれかの counterparty であるProposeを返します。
        statusパラメータでカンマ区切りの複数指定が可能です。
      tags: [Propose]
      parameters:
        - name: publicKey
          in: query
          required: true
          description: 検索する公開鍵（JWK JSON文字列、パーセントエンコード済み）
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: 絞り込むステータス（カンマ区切りで複数指定可。例: proposed,signed）
          schema:
            type: string
            example: proposed,signed
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: per
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposePage'
        '400':
          description: publicKeyが未指定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Propose作成
      description: |
        作成者が新しいProposeを作成します。
        署名対象: `"proposed." + proposeId + contentHash + creatorPublicKey + counterpartyPublicKeys（辞書順ソート&結合） + createdAt`
      tags: [Propose]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProposeInput'
            example:
              proposeId: "550E8400-E29B-41D4-A716-446655440000"
              contentHash: "abc123def456"
              creatorPublicKey: "BHqG..."
              creatorSignature: "MEUC..."
              counterpartyPublicKeys: ["BIrH...", "BJsI..."]
              createdAt: "2026-01-01T00:00:00Z"
      responses:
        '201':
          description: 作成成功
        '400':
          description: proposeIdの形式が無効、またはcounterpartyPublicKeysが空
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 署名検証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 同じIDのProposeが既に存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}:
    get:
      summary: Propose詳細取得
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposeResponse'
        '400':
          description: 無効なUUID形式
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proposeが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Proposeを解消（proposed → dissolved）
      description: |
        作成者またはいずれかの相手方が署名してProposeを解消します。proposed状態のみ可。
        署名対象: `"dissolved." + proposeId + contentHash + publicKey + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionInput'
            example:
              publicKey: "BHqG..."
              signature: "MEUC..."
              timestamp: "2026-01-02T00:00:00Z"
      responses:
        '200':
          description: 解消成功、dissolvedに遷移
        '401':
          description: 署名検証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 参加者以外の公開鍵
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proposeが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: proposed状態ではない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}/sign:
    patch:
      summary: 相手方が署名（全員揃うとproposed → signed）
      description: |
        登録済みの相手方が署名します。全ての相手方が署名した時点でsigned状態に自動遷移します。
        署名対象: `"signed." + proposeId + contentHash + signerPublicKey + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInput'
            example:
              signerPublicKey: "BIrH..."
              signature: "MEUC..."
              timestamp: "2026-01-01T00:00:00Z"
      responses:
        '200':
          description: 署名成功。全相手方が揃えばsignedに遷移
        '400':
          description: 無効なUUID形式
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 署名検証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: signerPublicKeyが登録済み相手方ではない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proposeが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: proposed状態ではない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}/honor:
    patch:
      summary: Honor署名を追加（全員揃うとsigned → honored）
      description: |
        各参加者が署名を追加します。作成者と全ての相手方が揃うとhonored状態に自動遷移。
        署名対象: `"honored." + proposeId + contentHash + publicKey + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionInput'
            example:
              publicKey: "BHqG..."
              signature: "MEUC..."
              timestamp: "2026-01-03T00:00:00Z"
      responses:
        '200':
          description: 署名記録。全員揃えばhonored遷移
        '401':
          description: 署名検証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 参加者以外の公開鍵
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proposeが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: signed状態ではない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposes/{id}/part:
    patch:
      summary: Part署名を追加（いずれか1人でsigned → 即座にparted）
      description: |
        いずれかの参加者が署名を追加します。1人でも送信した時点で即座にparted状態へ遷移します。全員分を待ちません。
        署名対象: `"parted." + proposeId + contentHash + publicKey + timestamp`
      tags: [Propose]
      parameters:
        - $ref: '#/components/parameters/ProposeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionInput'
            example:
              publicKey: "BHqG..."
              signature: "MEUC..."
              timestamp: "2026-01-03T00:00:00Z"
      responses:
        '200':
          description: 署名記録。即座にparted遷移
        '401':
          description: 署名検証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 参加者以外の公開鍵
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proposeが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: signed状態ではない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    ProposeId:
      name: id
      in: path
      required: true
      description: Propose ID（UUID）
      schema:
        type: string
        format: uuid

  schemas:
    ProposeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Propose ID（クライアントが生成）
        contentHash:
          type: string
          description: コンテンツのハッシュ値
        creatorPublicKey:
          type: string
          description: 作成者の公開鍵（JWK JSON文字列）
        creatorSignature:
          type: string
          description: 作成者の署名（Base64 / DER形式）
        counterparties:
          type: array
          items:
            $ref: '#/components/schemas/CounterpartyInfo'
          description: 相手方と各署名のリスト
        honorCreatorSignature:
          type: string
          nullable: true
          description: 作成者のhonor署名
        honorCreatorTimestamp:
          type: string
          nullable: true
          description: 作成者のhonorタイムスタンプ（ISO8601）
        partCreatorSignature:
          type: string
          nullable: true
          description: 作成者のpart署名
        partCreatorTimestamp:
          type: string
          nullable: true
          description: 作成者のpartタイムスタンプ（ISO8601）
        dissolvedAt:
          type: string
          nullable: true
          description: 解消タイムスタンプ（ISO8601）
        status:
          type: string
          enum: [proposed, signed, honored, dissolved, parted]
          description: 現在の状態
        signatureVersion:
          type: integer
          description: 署名スキームバージョン（現行: 1）
        createdAt:
          type: string
          description: 作成日時（ISO8601、クライアントが生成）
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: 最終更新日時（サーバーが管理）

    CounterpartyInfo:
      type: object
      properties:
        publicKey:
          type: string
          description: 相手方の公開鍵（JWK JSON文字列）
        signSignature:
          type: string
          nullable: true
          description: /sign の署名（署名後にセット）
        signTimestamp:
          type: string
          nullable: true
          description: /sign のタイムスタンプ（ISO8601）
        honorSignature:
          type: string
          nullable: true
          description: /honor の署名
        honorTimestamp:
          type: string
          nullable: true
          description: /honor のタイムスタンプ（ISO8601）
        partSignature:
          type: string
          nullable: true
          description: /part の署名
        partTimestamp:
          type: string
          nullable: true
          description: /part のタイムスタンプ（ISO8601）

    ProposePage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProposeResponse'
        metadata:
          type: object
          properties:
            page:
              type: integer
            per:
              type: integer
            total:
              type: integer

    CreateProposeInput:
      type: object
      required:
        - proposeId
        - contentHash
        - creatorPublicKey
        - creatorSignature
        - counterpartyPublicKeys
        - createdAt
      properties:
        proposeId:
          type: string
          description: UUID文字列（クライアントが生成）
        contentHash:
          type: string
          description: コンテンツのハッシュ値
        creatorPublicKey:
          type: string
          description: 作成者の公開鍵（JWK JSON文字列）
        creatorSignature:
          type: string
          description: 作成者の署名（Base64 / DER形式）
        counterpartyPublicKeys:
          type: array
          items:
            type: string
          minItems: 1
          description: 相手方の公開鍵リスト（1件以上）
        createdAt:
          type: string
          description: ISO8601形式の作成日時

    SignInput:
      type: object
      required:
        - signerPublicKey
        - signature
        - timestamp
      properties:
        signerPublicKey:
          type: string
          description: 署名者の公開鍵（登録済みの相手方であること、JWK JSON文字列）
        signature:
          type: string
          description: 署名者の署名（Base64 / DER形式）
        timestamp:
          type: string
          description: 操作タイムスタンプ（ISO8601）

    TransitionInput:
      type: object
      required:
        - publicKey
        - signature
        - timestamp
      properties:
        publicKey:
          type: string
          description: 操作者の公開鍵（creator or counterparty）
        signature:
          type: string
          description: 操作者の署名（Base64 / DER形式）
        timestamp:
          type: string
          description: 操作日時（ISO8601）

    ErrorResponse:
      type: object
      properties:
        error:
          type: boolean
          example: true
        reason:
          type: string
          description: エラーの理由
