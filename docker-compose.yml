version: '3.8'

services:
  app:
    image: wevospace:latest  # 既存のイメージ名
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://vapor:${DB_PASSWORD}@postgres:5432/wevospace
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wevospace

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: vapor
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: wevospace
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wevospace
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vapor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  wevospace:
    driver: bridge
